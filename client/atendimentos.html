<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaPet | Atendimentos</title>

    <link rel="stylesheet" href="./assets/styles/principal.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo-box">JP</div>
            <div>
                <h1>Java Pet</h1>
                <p>Sistema interno</p>
            </div>
        </div>

        <nav class="nav-tabs" aria-label="Menu principal">
            <a class="nav-tab active" href="./atendimentos.html">Atendimentos</a>
            <a class="nav-tab" href="./clientes.html">Clientes</a>
            <a class="nav-tab" href="./animais.html">Animais</a>
            <a class="nav-tab" href="./servicos.html">Servicos</a>
            <a class="nav-tab" href="./funcionarios.html">Funcionarios</a>
        </nav>

        <a class="logout-link" href="./login.html">Sair</a>
    </aside>

    <main class="page-content">
        <header class="page-header">
            <div>
                <p class="page-label">Gerenciamento</p>
                <h2>Atendimentos</h2>
            </div>

            <button id="openModalButton" class="primary-button" type="button">
                Novo atendimento
            </button>
        </header>

        <section class="list-card">
            <div class="list-header">
                <div>
                    <h3>Lista de atendimentos</h3>
                    <p>Consulte os atendimentos agendados para os animais.</p>
                </div>

            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Animal</th>
                            <th>Servico</th>
                            <th>Funcionario</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modalBackdrop" class="modal-backdrop" hidden>
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <header class="modal-header">
                <div>
                    <p class="page-label">Cadastro</p>
                    <h3 id="modalTitle">Novo atendimento</h3>
                </div>

                <button id="closeModalButton" class="close-button" type="button" aria-label="Fechar">
                    x
                </button>
            </header>

            <form id="appointmentForm" class="appointment-form">
                <input type="hidden" id="appointmentId" name="id">

                <div class="form-group">
                    <label for="cliente">Cliente</label>
                    <input id="cliente" name="cliente" type="text" required>
                </div>

                <div class="form-group">
                    <label for="animal">Animal</label>
                    <input id="animal" name="animal" type="text" required>
                </div>

                <div class="form-group">
                    <label for="servico">Servico</label>
                    <input id="servico" name="servico" type="text" required>
                </div>

                <div class="form-group">
                    <label for="funcionario">Funcionario</label>
                    <input id="funcionario" name="funcionario" type="text" required>
                </div>

                <div class="form-group">
                    <label for="data">Data</label>
                    <input id="data" name="data" type="date" required>
                </div>

                <div class="form-group">
                    <label for="horario">Horario</label>
                    <input id="horario" name="horario" type="time" required>
                </div>

                <div class="form-group full-width">
                    <label for="status">Status</label>
                    <select id="status" name="status" required>
                        <option value="Agendado">Agendado</option>
                        <option value="Em andamento">Em andamento</option>
                        <option value="Concluido">Concluido</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button id="cancelModalButton" class="secondary-button" type="button">
                        Cancelar
                    </button>

                    <button class="primary-button" type="submit">
                        Salvar
                    </button>
                </div>
            </form>
        </section>
    </div>

    <script src="./assets/js/atendimentos.js"></script>
</body>
</html>
