<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaPet | Animais</title>

    <link rel="stylesheet" href="./assets/styles/principal.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo-box">JP</div>
            <div>
                <h1>Java Pet</h1>
                <p>Sistema interno</p>
            </div>
        </div>

        <nav class="nav-tabs" aria-label="Menu principal">
            <a class="nav-tab" href="./atendimentos.html">Atendimentos</a>
            <a class="nav-tab" href="./clientes.html">Clientes</a>
            <a class="nav-tab active" href="./animais.html">Animais</a>
            <a class="nav-tab" href="./servicos.html">Servicos</a>
            <a class="nav-tab" href="./funcionarios.html">Funcionarios</a>
        </nav>

        <a class="logout-link" href="./login.html">Sair</a>
    </aside>

    <main class="page-content">
        <header class="page-header">
            <div>
                <p class="page-label">Gerenciamento</p>
                <h2>Animais</h2>
            </div>

            <button id="openModalButton" class="primary-button" type="button">
                Novo animal
            </button>
        </header>

        <section class="list-card">
            <div class="list-header">
                <div>
                    <h3>Lista de animais</h3>
                    <p>Consulte os animais cadastrados e seus respectivos clientes.</p>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Cliente</th>
                            <th>Especie</th>
                            <th>Raca</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="animalsTableBody"></tbody>
                </table>
            </div>

            <p id="animalFeedback" class="feedback-message"></p>
        </section>
    </main>

    <div id="modalBackdrop" class="modal-backdrop" hidden>
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <header class="modal-header">
                <div>
                    <p class="page-label">Cadastro</p>
                    <h3 id="modalTitle">Novo animal</h3>
                </div>

                <button id="closeModalButton" class="close-button" type="button" aria-label="Fechar">
                    x
                </button>
            </header>

            <form id="animalForm" class="appointment-form">
                <input type="hidden" id="animalId" name="id">

                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome" type="text" required>
                </div>

                <div class="form-group">
                    <label for="idCliente">Cliente</label>
                    <select id="idCliente" name="idCliente" required></select>
                </div>

                <div class="form-group">
                    <label for="especie">Especie</label>
                    <select id="especie" name="especie" required>
                        <option value="Cachorro">Cachorro</option>
                        <option value="Gato">Gato</option>
                        <option value="Ave">Ave</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="raca">Raca</label>
                    <input id="raca" name="raca" type="text" required>
                </div>

                <div class="form-actions">
                    <button id="cancelModalButton" class="secondary-button" type="button">
                        Cancelar
                    </button>

                    <button class="primary-button" type="submit">
                        Salvar
                    </button>
                </div>
            </form>
        </section>
    </div>

    <script src="./assets/js/animais.js"></script>
</body>
</html>
