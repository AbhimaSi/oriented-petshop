<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaPet | Funcionarios</title>

    <link rel="stylesheet" href="./assets/styles/principal.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo-box">JP</div>
            <div>
                <h1>Java Pet</h1>
                <p>Sistema interno</p>
            </div>
        </div>

        <nav class="nav-tabs" aria-label="Menu principal">
            <a class="nav-tab" href="./atendimentos.html">Atendimentos</a>
            <a class="nav-tab" href="./clientes.html">Clientes</a>
            <a class="nav-tab" href="./animais.html">Animais</a>
            <a class="nav-tab" href="./servicos.html">Servicos</a>
            <a class="nav-tab active" href="./funcionarios.html">Funcionarios</a>
        </nav>

        <a class="logout-link" href="./login.html">Sair</a>
    </aside>

    <main class="page-content">
        <header class="page-header">
            <div>
                <p class="page-label">Gerenciamento</p>
                <h2>Funcionarios</h2>
            </div>

            <button id="openModalButton" class="primary-button" type="button">
                Novo funcionario
            </button>
        </header>

        <section class="list-card">
            <div class="list-header">
                <div>
                    <h3>Lista de funcionarios</h3>
                    <p>Consulte os funcionarios cadastrados no petshop.</p>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Cargo</th>
                            <th>Telefone</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="employeesTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modalBackdrop" class="modal-backdrop" hidden>
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <header class="modal-header">
                <div>
                    <p class="page-label">Cadastro</p>
                    <h3 id="modalTitle">Novo funcionario</h3>
                </div>

                <button id="closeModalButton" class="close-button" type="button" aria-label="Fechar">
                    x
                </button>
            </header>

            <form id="employeeForm" class="appointment-form">
                <input type="hidden" id="employeeId" name="id">

                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome" type="text" required>
                </div>

                <div class="form-group">
                    <label for="cargo">Cargo</label>
                    <input id="cargo" name="cargo" type="text" required>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input id="telefone" name="telefone" type="text" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required>
                </div>

                <div class="form-group full-width">
                    <label for="status">Status</label>
                    <select id="status" name="status" required>
                        <option value="Ativo">Ativo</option>
                        <option value="Inativo">Inativo</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button id="cancelModalButton" class="secondary-button" type="button">
                        Cancelar
                    </button>

                    <button class="primary-button" type="submit">
                        Salvar
                    </button>
                </div>
            </form>
        </section>
    </div>

    <script src="./assets/js/funcionarios.js"></script>
</body>
</html>
